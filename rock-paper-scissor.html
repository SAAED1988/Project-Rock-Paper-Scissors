<!DOCTYPE html>

<html lang="en">

<head>
    
    <meta charset="UTF-8">
    <title>Project Rock Paper Scissor</title>

</head>

<body>
    
    <button id="rock">Rock</button>
    <button id="paper">Paper</button>
    <button id="scissor">Scissor</button>


    <script>
        //the project is based on all learn in basic curse o JS, if else, let, const, function, variables and more. 
//the bose of this game is make a game Rock-Paper-Scissor in the console.log only
//able to make a choice independently what is the input from the user, automatically answer by computer and making a match between options
//declare a winner of the game after 5 rounds played


        
        function getComputerChoice(){
            let computer = Math.floor(Math.random() * 100)+1;
                if (computer <= 33){
                    return "Rock";
                } else if (computer <= 66){
                    return "Paper";
                }else if (computer <=100)
                    return "Scissor";            
        }

            // Score to players
            let computerScore = 0;
            let humanScore = 0;
            
        function playRound(computerChoice, humanChoice){
                if (computerChoice == "Rock" 
                    && humanChoice == "Scissor") {
                    console.log("You lose! Rock beats Scissor.");
                    computerScore++;
                } else if (computerChoice == "Scissor" 
                            && humanChoice == "Paper"){
                            console.log("You lose! Scissor beats Paper.");
                            computerScore++;
                } else if (computerChoice == "Paper" 
                            && humanChoice == "Rock"){
                            console.log("You lose! Paper beats Rock.");
                            computerScore++;
                } else if (humanChoice == "Rock" 
                            && computerChoice == "Scissor"){
                            console.log("You win! Rock beats Scissor.");
                            humanScore++;
                } else if (humanChoice == "Scissor" 
                            && computerChoice == "Paper"){
                            console.log("You win! Scissor beats Paper.");
                            humanScore++;
                } else if (humanChoice == "Paper" 
                            && computerChoice == "Rock"){
                            console.log("You win! Paper beats Rock.");
                            humanScore++;
                } else {
                    console.log("Tie!!!.");
                }       
        }


        const rock = document.querySelector("#rock");
                    rock.addEventListener("click",function choices(){
                            playRound(getComputerChoice(),"Rock");
                        });

        const paper = document.querySelector("#paper");
                    paper.addEventListener("click",function choices(){
                            playRound(getComputerChoice(),"Paper");
                        });

        const scissor = document.querySelector("#scissor");
                    scissor.addEventListener("click",function choices(){
                            playRound(getComputerChoice(),"Scissor");
                        });

            
        // 5 rounds
        function playGame(){
            
         

            // EndGame
            if (computerScore === 3) {
                console.log("Computer is the WINNER!");
            } else if (humanScore === 3){
                console.log("You are the WINNER!");
            } else{
                console.log("GAME OVER!!!")
            }
        }
        playGame();

    </script>
