<!DOCTYPE html>

<html lang="en">

<head>
    
    <meta charset="UTF-8">
    <title>Project Rock Paper Scissor</title>

</head>

<body>
    <div id="buttons">
        <button id="Rock">Rock</button>
        <button id="Paper">Paper</button>
        <button id="Scissor">Scissor</button>
    </div>
        <div id="result"></div>

    <script>
        //the project is based on all learn in basic curse o JS, if else, let, const, function, variables and more. 
//the bose of this game is make a game Rock-Paper-Scissor in the console.log only
//able to make a choice independently what is the input from the user, automatically answer by computer and making a match between options
//declare a winner of the game after 5 rounds played


        
        function getComputerChoice(){
            let computer = Math.floor(Math.random() * 100)+1;
                if (computer <= 33){
                    return "Rock";
                } else if (computer <= 66){
                    return "Paper";
                }else if (computer <=100)
                    return "Scissor";            
        }

            // Score to players
            let computerScore = 0;
            let humanScore = 0;
    
            
        function playRound(computerChoice, humanChoice){
                if (computerChoice == "Rock" 
                    && humanChoice == "Scissor") {
                    computerScore++;
                    return "You lose! Rock beats Scissor.";
                    
                } else if (computerChoice == "Scissor" 
                            && humanChoice == "Paper"){
                            computerScore++;
                            return "You lose! Scissor beats Paper.";
                            
                } else if (computerChoice == "Paper" 
                            && humanChoice == "Rock"){
                            computerScore++;
                            return "You lose! Paper beats Rock.";
                            
                } else if (humanChoice == "Rock" 
                            && computerChoice == "Scissor"){
                            humanScore++;
                            return "You win! Rock beats Scissor.";
                            
                } else if (humanChoice == "Scissor" 
                            && computerChoice == "Paper"){
                            humanScore++;
                            return "You win! Scissor beats Paper.";
                            
                } else if (humanChoice == "Paper" 
                            && computerChoice == "Rock"){
                            humanScore++;
                            return "You win! Paper beats Rock.";
                            
                } else {
                    return "Tie!!!.";
                    
                }       
        }

        function updateDisplay (message){
            div.textContent = message + ` Player: ${humanScore} Computer: ${computerScore}`;
            let finalResult = endgame()
            if (finalResult !== undefined){
                endGame.textContent = finalResult;

                const buttons = document.querySelectorAll("button");
                buttons.forEach(button => {
                    button.disabled = true;
                });
            }
        }

        const div = document.querySelector("#result");
        const endGame = document.createElement("div");
        document.body.appendChild(endGame);
        const buttons = document.querySelector("#buttons")

        buttons.addEventListener("click", (event)=> {
            let target = event.target;

            switch(target.id){
                case "Rock":
                    let result1 = playRound(getComputerChoice(),target.id);
                    updateDisplay(result1);
                    break;
                case "Paper":
                    let result2 = playRound(getComputerChoice(),target.id);
                        updateDisplay(result2);
                    break;
                case "Scissor":
                    let result3 = playRound(getComputerChoice(),target.id);
                    updateDisplay(result3);
                    break;

            }
        })

        function endgame(){
            if (computerScore == 3) {
                return "Computer is the WINNER!";
            } else if (humanScore == 3){
                return "You are the WINNER!";
            } 
            
        }

    </script>



</body>
